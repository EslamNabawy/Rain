<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Rain Peer Core Animatable Source</title>
  <desc>Layered source. Animate named groups independently; node pivots are documented in peer_core_animation_manifest.json.</desc>
  <defs>
    <linearGradient id="peerCoreRing" x1="240" y1="180" x2="808" y2="844" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D7F9FF"/>
      <stop offset="0.48" stop-color="#7DEBFF"/>
      <stop offset="1" stop-color="#2DD4A3"/>
    </linearGradient>
    <clipPath id="appIconClip">
      <rect width="1024" height="1024" rx="230"/>
    </clipPath>
  </defs>

  <g id="app-icon-shell" data-layer="background" clip-path="url(#appIconClip)" opacity="0">
    <rect id="background-ink" width="1024" height="1024" fill="#061017"/>
    <rect id="background-deep-surface" width="1024" height="1024" fill="#0A1E26" opacity="0.56"/>
  </g>

  <g id="rain-streaks" data-layer="background-effect" opacity="0.18">
    <path id="rain-streak-1" d="M70 -40L250 1080" stroke="#7DEBFF" stroke-width="6"/>
    <path id="rain-streak-2" d="M230 -40L410 1080" stroke="#7DEBFF" stroke-width="6"/>
    <path id="rain-streak-3" d="M390 -40L570 1080" stroke="#7DEBFF" stroke-width="6"/>
    <path id="rain-streak-4" d="M550 -40L730 1080" stroke="#7DEBFF" stroke-width="6"/>
    <path id="rain-streak-5" d="M710 -40L890 1080" stroke="#7DEBFF" stroke-width="6"/>
    <path id="rain-streak-6" d="M870 -40L1050 1080" stroke="#7DEBFF" stroke-width="6"/>
  </g>

  <g id="wave-emission" data-layer="motion-effect" opacity="0.18">
    <circle id="wave-inner" cx="512" cy="512" r="356" stroke="#7DEBFF" stroke-width="4"/>
    <circle id="wave-middle" cx="512" cy="512" r="420" stroke="#7DEBFF" stroke-width="4"/>
    <circle id="wave-outer" cx="512" cy="512" r="486" stroke="#7DEBFF" stroke-width="4"/>
  </g>

  <g id="peer-core-mark" data-layer="mark">
    <g id="ring" data-pivot-x="512" data-pivot-y="512">
      <circle id="signal-ring" cx="512" cy="512" r="328" stroke="url(#peerCoreRing)" stroke-width="72"/>
    </g>

    <g id="links" data-layer="connectors">
      <path id="link-node-a-node-b" d="M410 584L614 441" stroke="#FCFEFF" stroke-opacity="0.82" stroke-width="42" stroke-linecap="round"/>
      <path id="link-node-b-node-c" d="M614 441L645 645" stroke="#FCFEFF" stroke-opacity="0.82" stroke-width="42" stroke-linecap="round"/>
      <path id="link-node-c-node-a" d="M645 645L410 584" stroke="#FCFEFF" stroke-opacity="0.82" stroke-width="42" stroke-linecap="round"/>
    </g>

    <g id="node-a" data-layer="peer-node" data-pivot-x="410" data-pivot-y="584">
      <circle id="node-a-fill" cx="410" cy="584" r="72" fill="#2DD4A3"/>
      <circle id="node-a-core" cx="410" cy="584" r="26" fill="#061017" fill-opacity="0.92"/>
    </g>

    <g id="node-b" data-layer="peer-node" data-pivot-x="614" data-pivot-y="441">
      <circle id="node-b-fill" cx="614" cy="441" r="72" fill="#2DD4A3"/>
      <circle id="node-b-core" cx="614" cy="441" r="26" fill="#061017" fill-opacity="0.92"/>
    </g>

    <g id="node-c" data-layer="peer-node" data-pivot-x="645" data-pivot-y="645">
      <circle id="node-c-fill" cx="645" cy="645" r="72" fill="#2DD4A3"/>
      <circle id="node-c-core" cx="645" cy="645" r="26" fill="#061017" fill-opacity="0.92"/>
    </g>
  </g>
</svg>
