name: rain
description: Rain peer-to-peer chat application.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.10.4

resolution: workspace

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.6.0
  connectivity_plus: ^7.1.1
  crypto: ^3.0.7
  file_picker: ^12.0.0-beta.3
  firebase_auth: ^6.1.1
  firebase_core: ^4.1.1
  firebase_database: ^12.0.4
  firebase_remote_config: ^6.1.1
  flutter_riverpod: ^3.3.1
  flutter_webrtc: ^1.4.1
  google_fonts: ^8.1.0
  open_filex: ^4.7.0
  package_info_plus: ^10.1.0
  path_provider: ^2.1.5
  peer_core:
    path: ../../packages/peer_core
  protocol_brain:
    path: ../../packages/protocol_brain
  rain_core:
    path: ../../packages/rain_core
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2
  window_manager: ^0.5.1
  freezed_annotation: ^3.1.0
  go_router: ^17.2.3
  flutter_svg: ^2.3.0
  rust_lib_rain:
    path: rust_builder
  flutter_rust_bridge: 2.12.0

dev_dependencies:
  build_runner: ^2.15.0
  drift: ^2.33.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  shared_preferences_platform_interface: ^2.4.2
  freezed: ^3.2.3

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
    - "assets/gender avatar/"
    - assets/sounds/
