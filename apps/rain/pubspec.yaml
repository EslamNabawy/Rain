name: rain
description: Rain peer-to-peer chat application.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.1.1
  firebase_remote_config: ^6.1.1
  flutter_background_service: ^5.1.0
  flutter_riverpod: ^2.6.1
  flutter_webrtc: ^0.14.2
  google_fonts: ^6.3.2
  package_info_plus: ^8.1.4
  peer_core:
    path: ../../packages/peer_core
  protocol_brain:
    path: ../../packages/protocol_brain
  rain_core:
    path: ../../packages/rain_core
  supabase_flutter: ^2.12.2
  tray_manager: ^0.5.1
  url_launcher: ^6.3.2
  window_manager: ^0.5.1
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
