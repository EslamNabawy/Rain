name: Release Rain

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing tag to publish
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-rain-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  FLUTTER_VERSION: '3.44.0'

jobs:
  build-windows:
    name: Build Windows Release
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Write production dart defines
        shell: pwsh
        env:
          RAIN_RELEASE_DART_DEFINES_JSON: ${{ secrets.RAIN_RELEASE_DART_DEFINES_JSON }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RAIN_RELEASE_DART_DEFINES_JSON)) {
            throw "RAIN_RELEASE_DART_DEFINES_JSON secret is required."
          }
          $definesPath = Join-Path $env:RUNNER_TEMP 'rain-release-defines.json'
          Set-Content -LiteralPath $definesPath -Value $env:RAIN_RELEASE_DART_DEFINES_JSON -Encoding utf8NoBOM
          "RAIN_DART_DEFINES_FILE=$definesPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build portable Windows release
        shell: pwsh
        run: |
          pwsh -NoProfile -File scripts\build_release.ps1 `
            -Platform windows `
            -OutputDir artifacts `
            -DartDefinesFile $env:RAIN_DART_DEFINES_FILE `
            -Clean

      - name: Verify Windows release package
        shell: pwsh
        run: |
          $portableDir = 'artifacts\Rain-windows-portable'
          foreach ($fileName in @(
            'rain.exe',
            'flutter_windows.dll',
            'flutter_webrtc_plugin.dll',
            'libwebrtc.dll',
            'sqlite3.dll',
            'data'
          )) {
            $path = Join-Path $portableDir $fileName
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Missing Windows runtime entry before release upload: $path"
            }
            Write-Host "Verified Windows runtime entry: $path"
          }

      - name: Upload Windows release artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-windows
          path: artifacts/Rain-windows-portable.zip
          if-no-files-found: error

  build-android:
    name: Build Android Release APKs
    runs-on: windows-2022
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref }}

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Prepare production Android secrets
        shell: pwsh
        env:
          RAIN_RELEASE_DART_DEFINES_JSON: ${{ secrets.RAIN_RELEASE_DART_DEFINES_JSON }}
          RAIN_RELEASE_KEYSTORE_BASE64: ${{ secrets.RAIN_RELEASE_KEYSTORE_BASE64 }}
          RAIN_RELEASE_STORE_PASSWORD: ${{ secrets.RAIN_RELEASE_STORE_PASSWORD }}
          RAIN_RELEASE_KEY_ALIAS: ${{ secrets.RAIN_RELEASE_KEY_ALIAS }}
          RAIN_RELEASE_KEY_PASSWORD: ${{ secrets.RAIN_RELEASE_KEY_PASSWORD }}
        run: |
          foreach ($required in @(
            'RAIN_RELEASE_DART_DEFINES_JSON',
            'RAIN_RELEASE_KEYSTORE_BASE64',
            'RAIN_RELEASE_STORE_PASSWORD',
            'RAIN_RELEASE_KEY_ALIAS',
            'RAIN_RELEASE_KEY_PASSWORD'
          )) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($required))) {
              throw "$required secret is required."
            }
          }

          $definesPath = Join-Path $env:RUNNER_TEMP 'rain-release-defines.json'
          Set-Content -LiteralPath $definesPath -Value $env:RAIN_RELEASE_DART_DEFINES_JSON -Encoding utf8NoBOM

          $keystorePath = Join-Path $env:RUNNER_TEMP 'rain-release.jks'
          [IO.File]::WriteAllBytes($keystorePath, [Convert]::FromBase64String($env:RAIN_RELEASE_KEYSTORE_BASE64))

          "RAIN_DART_DEFINES_FILE=$definesPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RAIN_RELEASE_STORE_FILE=$keystorePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RAIN_RELEASE_STORE_PASSWORD=$env:RAIN_RELEASE_STORE_PASSWORD" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RAIN_RELEASE_KEY_ALIAS=$env:RAIN_RELEASE_KEY_ALIAS" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RAIN_RELEASE_KEY_PASSWORD=$env:RAIN_RELEASE_KEY_PASSWORD" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Android release APKs
        shell: pwsh
        run: |
          pwsh -NoProfile -File scripts\build_release.ps1 `
            -Platform android `
            -OutputDir artifacts `
            -DartDefinesFile $env:RAIN_DART_DEFINES_FILE `
            -Clean

      - name: Verify Android release APK ABI set
        shell: pwsh
        run: |
          $expected = @(
            @{ Label = 'Android ARM v8/v9 APK (arm64-v8a)'; Path = 'artifacts\Rain-release-android-arm64-v8a.apk' }
          )
          foreach ($artifact in $expected) {
            if (-not (Test-Path -LiteralPath $artifact.Path)) {
              throw "Missing expected artifact for $($artifact.Label): $($artifact.Path)"
            }
            Write-Host "Verified $($artifact.Label): $($artifact.Path)"
          }
          Add-Type -AssemblyName System.IO.Compression -ErrorAction SilentlyContinue
          Add-Type -AssemblyName System.IO.Compression.FileSystem -ErrorAction SilentlyContinue
          function Assert-ApkEntry([string]$Path, [string]$Entry) {
            $archive = [System.IO.Compression.ZipFile]::OpenRead($Path)
            try {
              $entryNames = @($archive.Entries | ForEach-Object { $_.FullName })
              if ($entryNames -notcontains $Entry) {
                throw "APK is missing required native runtime entry: $Path -> $Entry"
              }
            } finally {
              $archive.Dispose()
            }
            Write-Host "Verified APK native runtime entry: $Path -> $Entry"
          }
          Assert-ApkEntry 'artifacts\Rain-release-android-arm64-v8a.apk' 'lib/arm64-v8a/libsqlite3.so'
          Assert-ApkEntry 'artifacts\Rain-release-android-arm64-v8a.apk' 'lib/arm64-v8a/libjingle_peerconnection_so.so'

      - name: Upload Android release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-android
          path: artifacts/*.apk
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-android
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: release-windows
          path: artifacts

      - name: Download Android artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-android
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
