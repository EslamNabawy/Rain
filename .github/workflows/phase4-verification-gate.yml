name: Phase 4 Verification Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

env:
  FLUTTER_VERSION: '3.38.5'

jobs:
  verify-phase4:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Bootstrap root package
        run: dart pub get

      - name: Run Phase 4 verifier
        run: node scripts/phase4-runner.js

      - name: Validate Phase 4 output
        if: ${{ always() }}
        run: node scripts/validate_phase4_output.js
