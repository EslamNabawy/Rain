name: Build Rain Apps

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform artifacts to build
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - windows
      build_profile:
        description: Demo uses OpenRelay/demo signing; production requires release secrets
        required: true
        default: demo
        type: choice
        options:
          - demo
          - production
      publish_test_release:
        description: Publish direct APK/Windows download links in a GitHub pre-release
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: build-rain-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && inputs.platform || 'all' }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.44.0'
  BUILD_PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.build_profile || 'demo' }}

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-2022
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'windows' }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Prepare dart defines
        shell: pwsh
        env:
          RAIN_RELEASE_DART_DEFINES_JSON: ${{ secrets.RAIN_RELEASE_DART_DEFINES_JSON }}
        run: |
          $definesPath = Join-Path $env:RUNNER_TEMP 'rain-defines.json'
          if ($env:BUILD_PROFILE -eq 'production') {
            if ([string]::IsNullOrWhiteSpace($env:RAIN_RELEASE_DART_DEFINES_JSON)) {
              throw "RAIN_RELEASE_DART_DEFINES_JSON secret is required for production builds."
            }
            Set-Content -LiteralPath $definesPath -Value $env:RAIN_RELEASE_DART_DEFINES_JSON -Encoding utf8NoBOM
          } else {
            Copy-Item -LiteralPath 'apps\rain\tool\dart_defines.example.json' -Destination $definesPath -Force
            $defines = Get-Content -Raw -LiteralPath $definesPath | ConvertFrom-Json -ErrorAction Stop
            if ($null -eq $defines.PSObject.Properties['CONNECTION_REQUEST_BACKEND_MODE']) {
              $defines | Add-Member -NotePropertyName 'CONNECTION_REQUEST_BACKEND_MODE' -NotePropertyValue 'rtdbOnly'
            } else {
              $defines.CONNECTION_REQUEST_BACKEND_MODE = 'rtdbOnly'
            }
            $defines | ConvertTo-Json -Depth 20 | Set-Content -LiteralPath $definesPath -Encoding utf8NoBOM
          }
          "RAIN_DART_DEFINES_FILE=$definesPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Windows artifact
        shell: pwsh
        run: |
          $args = @(
            '-NoProfile',
            '-File',
            'scripts\build_release.ps1',
            '-Platform',
            'windows',
            '-OutputDir',
            'artifacts',
            '-DartDefinesFile',
            $env:RAIN_DART_DEFINES_FILE,
            '-Clean'
          )
          if ($env:BUILD_PROFILE -eq 'demo') {
            $args += '-AllowPublicTurnForDemo'
          }
          pwsh @args

      - name: Verify Windows native runtime bundle
        shell: pwsh
        run: |
          $portableDir = if ($env:BUILD_PROFILE -eq 'demo') {
            'artifacts\Rain-Demo-Windows-x64-Build'
          } else {
            'artifacts\Rain-windows-portable'
          }
          foreach ($fileName in @(
            'rain.exe',
            'flutter_windows.dll',
            'flutter_webrtc_plugin.dll',
            'libwebrtc.dll',
            'sqlite3.dll',
            'win32_windows_x64.dll',
            'data'
          )) {
            $path = Join-Path $portableDir $fileName
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Missing Windows runtime entry before upload: $path"
            }
            Write-Host "Verified Windows runtime entry: $path"
          }

      - name: Upload Windows demo portable app
        if: ${{ env.BUILD_PROFILE == 'demo' }}
        uses: actions/upload-artifact@v7
        with:
          name: Rain-Demo-Windows-x64-Build
          path: artifacts/Rain-Demo-Windows-x64-Build
          if-no-files-found: error

      - name: Upload Windows production portable app
        if: ${{ env.BUILD_PROFILE == 'production' }}
        uses: actions/upload-artifact@v7
        with:
          name: Rain-Release-Windows-x64-Build
          path: artifacts/Rain-windows-portable
          if-no-files-found: error

  build-android:
    name: Build Android APKs
    runs-on: windows-2022
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'android' }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Prepare dart defines and signing
        shell: pwsh
        env:
          RAIN_RELEASE_DART_DEFINES_JSON: ${{ secrets.RAIN_RELEASE_DART_DEFINES_JSON }}
          RAIN_RELEASE_KEYSTORE_BASE64: ${{ secrets.RAIN_RELEASE_KEYSTORE_BASE64 }}
          RAIN_RELEASE_STORE_PASSWORD: ${{ secrets.RAIN_RELEASE_STORE_PASSWORD }}
          RAIN_RELEASE_KEY_ALIAS: ${{ secrets.RAIN_RELEASE_KEY_ALIAS }}
          RAIN_RELEASE_KEY_PASSWORD: ${{ secrets.RAIN_RELEASE_KEY_PASSWORD }}
        run: |
          $definesPath = Join-Path $env:RUNNER_TEMP 'rain-defines.json'
          if ($env:BUILD_PROFILE -eq 'production') {
            foreach ($required in @(
              'RAIN_RELEASE_DART_DEFINES_JSON',
              'RAIN_RELEASE_KEYSTORE_BASE64',
              'RAIN_RELEASE_STORE_PASSWORD',
              'RAIN_RELEASE_KEY_ALIAS',
              'RAIN_RELEASE_KEY_PASSWORD'
            )) {
              if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($required))) {
                throw "$required secret is required for production Android builds."
              }
            }

            Set-Content -LiteralPath $definesPath -Value $env:RAIN_RELEASE_DART_DEFINES_JSON -Encoding utf8NoBOM
            $keystorePath = Join-Path $env:RUNNER_TEMP 'rain-release.jks'
            [IO.File]::WriteAllBytes($keystorePath, [Convert]::FromBase64String($env:RAIN_RELEASE_KEYSTORE_BASE64))
            "RAIN_RELEASE_STORE_FILE=$keystorePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "RAIN_RELEASE_STORE_PASSWORD=$env:RAIN_RELEASE_STORE_PASSWORD" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "RAIN_RELEASE_KEY_ALIAS=$env:RAIN_RELEASE_KEY_ALIAS" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "RAIN_RELEASE_KEY_PASSWORD=$env:RAIN_RELEASE_KEY_PASSWORD" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            Copy-Item -LiteralPath 'apps\rain\tool\dart_defines.example.json' -Destination $definesPath -Force
            $defines = Get-Content -Raw -LiteralPath $definesPath | ConvertFrom-Json -ErrorAction Stop
            if ($null -eq $defines.PSObject.Properties['CONNECTION_REQUEST_BACKEND_MODE']) {
              $defines | Add-Member -NotePropertyName 'CONNECTION_REQUEST_BACKEND_MODE' -NotePropertyValue 'rtdbOnly'
            } else {
              $defines.CONNECTION_REQUEST_BACKEND_MODE = 'rtdbOnly'
            }
            $defines | ConvertTo-Json -Depth 20 | Set-Content -LiteralPath $definesPath -Encoding utf8NoBOM
          }
          "RAIN_DART_DEFINES_FILE=$definesPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Android APK artifacts
        shell: pwsh
        run: |
          $args = @(
            '-NoProfile',
            '-File',
            'scripts\build_release.ps1',
            '-Platform',
            'android',
            '-OutputDir',
            'artifacts',
            '-DartDefinesFile',
            $env:RAIN_DART_DEFINES_FILE,
            '-AndroidArtifactSet',
            'mobile',
            '-Clean'
          )
          if ($env:BUILD_PROFILE -eq 'demo') {
            $args += '-AllowPublicTurnForDemo'
            $args += '-UseDemoAndroidSigningKey'
          }
          pwsh @args

      - name: Verify Android APK ABI set
        shell: pwsh
        run: |
          if ($env:BUILD_PROFILE -eq 'demo') {
            $expected = @(
              @{ Label = 'Android ARM v7 APK (armeabi-v7a)'; Path = 'artifacts\Rain-Demo-Android-ARM-v7a-Build.apk' },
              @{ Label = 'Android ARM v8/v9 APK (arm64-v8a)'; Path = 'artifacts\Rain-Demo-Android-ARM-v8-v9-Build.apk' }
            )
          } else {
            $prefix = 'Rain-release'
            $expected = @(
              @{ Label = 'Android ARM v7 APK (armeabi-v7a)'; Path = "artifacts\$prefix-android-armeabi-v7a.apk" },
              @{ Label = 'Android ARM v8/v9 APK (arm64-v8a)'; Path = "artifacts\$prefix-android-arm64-v8a.apk" }
            )
          }
          foreach ($artifact in $expected) {
            if (-not (Test-Path -LiteralPath $artifact.Path)) {
              throw "Missing expected artifact for $($artifact.Label): $($artifact.Path)"
            }
            Write-Host "Verified $($artifact.Label): $($artifact.Path)"
          }
          Add-Type -AssemblyName System.IO.Compression -ErrorAction SilentlyContinue
          Add-Type -AssemblyName System.IO.Compression.FileSystem -ErrorAction SilentlyContinue
          function Assert-ApkEntry([string]$Path, [string]$Entry) {
            $archive = [System.IO.Compression.ZipFile]::OpenRead($Path)
            try {
              $entryNames = @($archive.Entries | ForEach-Object { $_.FullName })
              if ($entryNames -notcontains $Entry) {
                throw "APK is missing required native runtime entry: $Path -> $Entry"
              }
            } finally {
              $archive.Dispose()
            }
            Write-Host "Verified APK native runtime entry: $Path -> $Entry"
          }
          if ($env:BUILD_PROFILE -eq 'demo') {
            Assert-ApkEntry 'artifacts\Rain-Demo-Android-ARM-v7a-Build.apk' 'lib/armeabi-v7a/libsqlite3.so'
            Assert-ApkEntry 'artifacts\Rain-Demo-Android-ARM-v7a-Build.apk' 'lib/armeabi-v7a/libjingle_peerconnection_so.so'
            Assert-ApkEntry 'artifacts\Rain-Demo-Android-ARM-v8-v9-Build.apk' 'lib/arm64-v8a/libsqlite3.so'
            Assert-ApkEntry 'artifacts\Rain-Demo-Android-ARM-v8-v9-Build.apk' 'lib/arm64-v8a/libjingle_peerconnection_so.so'
          } else {
            Assert-ApkEntry 'artifacts\Rain-release-android-armeabi-v7a.apk' 'lib/armeabi-v7a/libsqlite3.so'
            Assert-ApkEntry 'artifacts\Rain-release-android-armeabi-v7a.apk' 'lib/armeabi-v7a/libjingle_peerconnection_so.so'
            Assert-ApkEntry 'artifacts\Rain-release-android-arm64-v8a.apk' 'lib/arm64-v8a/libsqlite3.so'
            Assert-ApkEntry 'artifacts\Rain-release-android-arm64-v8a.apk' 'lib/arm64-v8a/libjingle_peerconnection_so.so'
          }

      - name: Upload Android APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BUILD_PROFILE == 'demo' && 'Rain-Demo-Android-Builds' || 'Rain-Release-Android-Builds' }}
          path: |
            artifacts/Rain-Demo-Android-ARM-v7a-Build.apk
            artifacts/Rain-Demo-Android-ARM-v8-v9-Build.apk
            artifacts/Rain-release-android-armeabi-v7a.apk
            artifacts/Rain-release-android-arm64-v8a.apk
          if-no-files-found: error

  publish-test-release:
    name: Publish Direct Test Downloads
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-android
    if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.publish_test_release == true }}
    timeout-minutes: 20
    steps:
      - name: Validate requested build jobs
        shell: bash
        run: |
          set -euo pipefail
          case "${{ inputs.platform }}" in
            all)
              test "${{ needs.build-windows.result }}" = "success"
              test "${{ needs.build-android.result }}" = "success"
              ;;
            android)
              test "${{ needs.build-android.result }}" = "success"
              ;;
            windows)
              test "${{ needs.build-windows.result }}" = "success"
              ;;
            *)
              echo "Unsupported platform input: ${{ inputs.platform }}" >&2
              exit 1
              ;;
          esac

      - name: Download Android APK artifact bundle
        if: ${{ inputs.platform == 'all' || inputs.platform == 'android' }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.BUILD_PROFILE == 'demo' && 'Rain-Demo-Android-Builds' || 'Rain-Release-Android-Builds' }}
          path: release-assets/android

      - name: Download Windows portable artifact
        if: ${{ inputs.platform == 'all' || inputs.platform == 'windows' }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.BUILD_PROFILE == 'demo' && 'Rain-Demo-Windows-x64-Build' || 'Rain-Release-Windows-x64-Build' }}
          path: release-assets/windows

      - name: Prepare direct release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets/publish

          if [ "${BUILD_PROFILE}" = "demo" ]; then
            profile_label="Demo"
            android_v7_source="release-assets/android/Rain-Demo-Android-ARM-v7a-Build.apk"
            android_v8_source="release-assets/android/Rain-Demo-Android-ARM-v8-v9-Build.apk"
            windows_root_name="Rain-Demo-Windows-x64-Build"
          else
            profile_label="Release"
            android_v7_source="release-assets/android/Rain-release-android-armeabi-v7a.apk"
            android_v8_source="release-assets/android/Rain-release-android-arm64-v8a.apk"
            windows_root_name="Rain-Release-Windows-x64-Build"
          fi

          if [ -f "${android_v7_source}" ]; then
            cp "${android_v7_source}" "release-assets/publish/Rain-${profile_label}-Android-v7a.apk"
          fi
          if [ -f "${android_v8_source}" ]; then
            cp "${android_v8_source}" "release-assets/publish/Rain-${profile_label}-Android-v8-v9.apk"
          fi

          if [ -d release-assets/windows ]; then
            mkdir -p "release-assets/windows-zip/${windows_root_name}"
            cp -R release-assets/windows/. "release-assets/windows-zip/${windows_root_name}/"
            (cd release-assets/windows-zip && zip -qr "../publish/Rain-${profile_label}-Windows-x64.zip" "${windows_root_name}")
          fi

          shopt -s nullglob
          assets=(release-assets/publish/*)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No direct release assets were prepared." >&2
            exit 1
          fi
          printf 'Prepared direct release assets:\n'
          printf ' - %s\n' "${assets[@]}"

      - name: Publish GitHub pre-release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          tag="rain-test-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          short_sha="${GITHUB_SHA::7}"
          title="Rain test build ${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT} (${short_sha})"
          release_url="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${tag}"

          gh release delete "${tag}" --repo "${GITHUB_REPOSITORY}" --yes --cleanup-tag >/dev/null 2>&1 || true
          gh release create "${tag}" release-assets/publish/* \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${GITHUB_SHA}" \
            --title "${title}" \
            --notes "Direct device downloads for Rain ${BUILD_PROFILE} build from ${GITHUB_SHA}. APK assets are uploaded individually so Android phones can download them without extracting an archive." \
            --prerelease

          {
            echo "## Rain direct test downloads"
            echo
            echo "Release: [${tag}](${release_url})"
            echo
            for asset_path in release-assets/publish/*; do
              asset_name="$(basename "${asset_path}")"
              echo "- [${asset_name}](https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}/${asset_name})"
            done
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Delete old Rain test releases
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          keep=10
          mapfile -t old_tags < <(
            gh release list --repo "${GITHUB_REPOSITORY}" --limit 100 --json tagName --jq '.[].tagName' |
              grep '^rain-test-' |
              sed -n "$((keep + 1)),\$p"
          )
          for old_tag in "${old_tags[@]}"; do
            echo "Deleting old test release: ${old_tag}"
            gh release delete "${old_tag}" --repo "${GITHUB_REPOSITORY}" --yes --cleanup-tag || true
          done
