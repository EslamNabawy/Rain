name: Build Rain Apps

on:
  push:
    branches:
      - main
      - dev
      - 'codex/**'
  workflow_dispatch:
    inputs:
      platform:
        description: Platform artifacts to build
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - windows
      build_profile:
        description: Demo uses OpenRelay; relay-test uses broker + demo signing; production requires release secrets
        required: true
        default: demo
        type: choice
        options:
          - demo
          - relay-test
          - production

permissions:
  contents: read

concurrency:
  group: build-rain-${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'workflow_dispatch' && inputs.platform || 'all' }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.38.5'
  BUILD_PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.build_profile || 'relay-test' }}

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-2022
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'windows' }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Prepare dart defines
        shell: pwsh
        env:
          RAIN_RELEASE_DART_DEFINES_JSON: ${{ secrets.RAIN_RELEASE_DART_DEFINES_JSON }}
        run: |
          $definesPath = Join-Path $env:RUNNER_TEMP 'rain-defines.json'
          if ($env:BUILD_PROFILE -in @('production', 'relay-test')) {
            if ([string]::IsNullOrWhiteSpace($env:RAIN_RELEASE_DART_DEFINES_JSON)) {
              throw "RAIN_RELEASE_DART_DEFINES_JSON secret is required for $env:BUILD_PROFILE builds."
            }
            Set-Content -LiteralPath $definesPath -Value $env:RAIN_RELEASE_DART_DEFINES_JSON -Encoding utf8NoBOM
          } else {
            Copy-Item -LiteralPath 'apps\rain\tool\dart_defines.example.json' -Destination $definesPath -Force
          }
          "RAIN_DART_DEFINES_FILE=$definesPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify relay-test TURN broker endpoint
        if: ${{ env.BUILD_PROFILE == 'relay-test' }}
        shell: pwsh
        run: |
          $defines = Get-Content -Raw -LiteralPath $env:RAIN_DART_DEFINES_FILE | ConvertFrom-Json
          $brokerUrl = [string]$defines.RAIN_TURN_BROKER_URL
          if ([string]::IsNullOrWhiteSpace($brokerUrl)) {
            throw 'Relay-test build requires RAIN_TURN_BROKER_URL.'
          }

          try {
            $response = Invoke-WebRequest -Uri $brokerUrl -Method POST -TimeoutSec 20 -SkipHttpErrorCheck
          } catch {
            throw "TURN broker endpoint is unreachable: $($_.Exception.Message)"
          }

          if ($response.StatusCode -eq 404) {
            throw "TURN broker endpoint returned 404. Deploy rainTurnCredentials before building relay-test artifacts: $brokerUrl"
          }
          if ($response.StatusCode -ne 401) {
            throw "Unauthenticated TURN broker preflight expected HTTP 401, got HTTP $($response.StatusCode)."
          }

      - name: Build Windows artifact
        shell: pwsh
        run: |
          $args = @(
            '-NoProfile',
            '-File',
            'scripts\build_release.ps1',
            '-Platform',
            'windows',
            '-OutputDir',
            'artifacts',
            '-DartDefinesFile',
            $env:RAIN_DART_DEFINES_FILE,
            '-Clean'
          )
          if ($env:BUILD_PROFILE -eq 'demo') {
            $args += '-AllowPublicTurnForDemo'
          }
          if ($env:BUILD_PROFILE -eq 'relay-test') {
            $args += '-RelayTest'
          }
          pwsh @args

      - name: Upload Windows demo portable app
        if: ${{ env.BUILD_PROFILE == 'demo' }}
        uses: actions/upload-artifact@v7
        with:
          name: Rain-Demo-Windows-x64-Build
          path: artifacts/Rain-Demo-Windows-x64-Build
          if-no-files-found: error

      - name: Upload Windows relay-test portable app
        if: ${{ env.BUILD_PROFILE == 'relay-test' }}
        uses: actions/upload-artifact@v7
        with:
          name: Rain-Relay-Test-Windows-x64-Build
          path: artifacts/Rain-Relay-Test-Windows-x64-Build
          if-no-files-found: error

      - name: Upload Windows production portable app
        if: ${{ env.BUILD_PROFILE == 'production' }}
        uses: actions/upload-artifact@v7
        with:
          name: Rain-Release-Windows-x64-Build
          path: artifacts/Rain-windows-portable
          if-no-files-found: error

  build-android:
    name: Build Android APKs
    runs-on: windows-2022
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.platform == 'all' || inputs.platform == 'android' }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Prepare dart defines and signing
        shell: pwsh
        env:
          RAIN_RELEASE_DART_DEFINES_JSON: ${{ secrets.RAIN_RELEASE_DART_DEFINES_JSON }}
          RAIN_RELEASE_KEYSTORE_BASE64: ${{ secrets.RAIN_RELEASE_KEYSTORE_BASE64 }}
          RAIN_RELEASE_STORE_PASSWORD: ${{ secrets.RAIN_RELEASE_STORE_PASSWORD }}
          RAIN_RELEASE_KEY_ALIAS: ${{ secrets.RAIN_RELEASE_KEY_ALIAS }}
          RAIN_RELEASE_KEY_PASSWORD: ${{ secrets.RAIN_RELEASE_KEY_PASSWORD }}
        run: |
          $definesPath = Join-Path $env:RUNNER_TEMP 'rain-defines.json'
          if ($env:BUILD_PROFILE -in @('production', 'relay-test')) {
            if ([string]::IsNullOrWhiteSpace($env:RAIN_RELEASE_DART_DEFINES_JSON)) {
              throw "RAIN_RELEASE_DART_DEFINES_JSON secret is required for $env:BUILD_PROFILE Android builds."
            }
            Set-Content -LiteralPath $definesPath -Value $env:RAIN_RELEASE_DART_DEFINES_JSON -Encoding utf8NoBOM
          }

          if ($env:BUILD_PROFILE -eq 'production') {
            foreach ($required in @(
              'RAIN_RELEASE_KEYSTORE_BASE64',
              'RAIN_RELEASE_STORE_PASSWORD',
              'RAIN_RELEASE_KEY_ALIAS',
              'RAIN_RELEASE_KEY_PASSWORD'
            )) {
              if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($required))) {
                throw "$required secret is required for production Android builds."
              }
            }

            $keystorePath = Join-Path $env:RUNNER_TEMP 'rain-release.jks'
            [IO.File]::WriteAllBytes($keystorePath, [Convert]::FromBase64String($env:RAIN_RELEASE_KEYSTORE_BASE64))
            "RAIN_RELEASE_STORE_FILE=$keystorePath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "RAIN_RELEASE_STORE_PASSWORD=$env:RAIN_RELEASE_STORE_PASSWORD" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "RAIN_RELEASE_KEY_ALIAS=$env:RAIN_RELEASE_KEY_ALIAS" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            "RAIN_RELEASE_KEY_PASSWORD=$env:RAIN_RELEASE_KEY_PASSWORD" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            if ($env:BUILD_PROFILE -eq 'demo') {
              Copy-Item -LiteralPath 'apps\rain\tool\dart_defines.example.json' -Destination $definesPath -Force
            }
          }
          "RAIN_DART_DEFINES_FILE=$definesPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify relay-test TURN broker endpoint
        if: ${{ env.BUILD_PROFILE == 'relay-test' }}
        shell: pwsh
        run: |
          $defines = Get-Content -Raw -LiteralPath $env:RAIN_DART_DEFINES_FILE | ConvertFrom-Json
          $brokerUrl = [string]$defines.RAIN_TURN_BROKER_URL
          if ([string]::IsNullOrWhiteSpace($brokerUrl)) {
            throw 'Relay-test build requires RAIN_TURN_BROKER_URL.'
          }

          try {
            $response = Invoke-WebRequest -Uri $brokerUrl -Method POST -TimeoutSec 20 -SkipHttpErrorCheck
          } catch {
            throw "TURN broker endpoint is unreachable: $($_.Exception.Message)"
          }

          if ($response.StatusCode -eq 404) {
            throw "TURN broker endpoint returned 404. Deploy rainTurnCredentials before building relay-test artifacts: $brokerUrl"
          }
          if ($response.StatusCode -ne 401) {
            throw "Unauthenticated TURN broker preflight expected HTTP 401, got HTTP $($response.StatusCode)."
          }

      - name: Build Android APK artifacts
        shell: pwsh
        run: |
          $args = @(
            '-NoProfile',
            '-File',
            'scripts\build_release.ps1',
            '-Platform',
            'android',
            '-OutputDir',
            'artifacts',
            '-DartDefinesFile',
            $env:RAIN_DART_DEFINES_FILE,
            '-AndroidArtifactSet',
            'mobile',
            '-Clean'
          )
          if ($env:BUILD_PROFILE -eq 'demo') {
            $args += '-AllowPublicTurnForDemo'
            $args += '-UseDemoAndroidSigningKey'
          }
          if ($env:BUILD_PROFILE -eq 'relay-test') {
            $args += '-RelayTest'
            $args += '-UseDemoAndroidSigningKey'
          }
          pwsh @args

      - name: Verify Android APK ABI set
        shell: pwsh
        run: |
          if ($env:BUILD_PROFILE -eq 'demo') {
            $expected = @(
              @{ Label = 'Android universal APK'; Path = 'artifacts\Rain-Demo-Android-Universal-Build.apk' },
              @{ Label = 'Android ARM v7 APK (armeabi-v7a)'; Path = 'artifacts\Rain-Demo-Android-ARM-v7-Build.apk' },
              @{ Label = 'Android ARM v8/v9 APK (arm64-v8a)'; Path = 'artifacts\Rain-Demo-Android-ARM-v8-v9-Build.apk' }
            )
          } elseif ($env:BUILD_PROFILE -eq 'relay-test') {
            $prefix = 'Rain-Relay-Test'
            $expected = @(
              @{ Label = 'Android universal APK'; Path = "artifacts\$prefix-android-universal.apk" },
              @{ Label = 'Android default/universal APK alias'; Path = "artifacts\$prefix-android.apk" },
              @{ Label = 'Android ARM v7 APK (armeabi-v7a)'; Path = "artifacts\$prefix-android-armeabi-v7a.apk" },
              @{ Label = 'Android ARM v8/v9 APK (arm64-v8a)'; Path = "artifacts\$prefix-android-arm64-v8a.apk" }
            )
          } else {
            $prefix = 'Rain-release'
            $expected = @(
              @{ Label = 'Android universal APK'; Path = "artifacts\$prefix-android-universal.apk" },
              @{ Label = 'Android default/universal APK alias'; Path = "artifacts\$prefix-android.apk" },
              @{ Label = 'Android ARM v7 APK (armeabi-v7a)'; Path = "artifacts\$prefix-android-armeabi-v7a.apk" },
              @{ Label = 'Android ARM v8/v9 APK (arm64-v8a)'; Path = "artifacts\$prefix-android-arm64-v8a.apk" }
            )
          }
          foreach ($artifact in $expected) {
            if (-not (Test-Path -LiteralPath $artifact.Path)) {
              throw "Missing expected artifact for $($artifact.Label): $($artifact.Path)"
            }
            Write-Host "Verified $($artifact.Label): $($artifact.Path)"
          }

      - name: Upload Android APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BUILD_PROFILE == 'demo' && 'Rain-Demo-Android-Builds' || env.BUILD_PROFILE == 'relay-test' && 'Rain-Relay-Test-Android-Builds' || 'Rain-Release-Android-Builds' }}
          path: |
            artifacts/Rain-Demo-Android-Universal-Build.apk
            artifacts/Rain-Demo-Android-ARM-v8-v9-Build.apk
            artifacts/Rain-Demo-Android-ARM-v7-Build.apk
            artifacts/Rain-Relay-Test-android.apk
            artifacts/Rain-Relay-Test-android-universal.apk
            artifacts/Rain-Relay-Test-android-arm64-v8a.apk
            artifacts/Rain-Relay-Test-android-armeabi-v7a.apk
            artifacts/Rain-release-android.apk
            artifacts/Rain-release-android-universal.apk
            artifacts/Rain-release-android-arm64-v8a.apk
            artifacts/Rain-release-android-armeabi-v7a.apk
          if-no-files-found: error
