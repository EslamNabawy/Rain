name: CI/CD

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      build_relay_test:
        description: Build broker-backed relay-test artifacts
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/') }}

env:
  FLUTTER_VERSION: '3.44.0'
  FRB_CODEGEN_VERSION: '2.12.0'
  JAVA_VERSION: '21'
  NODE_VERSION: '20'
  RAIN_APP_DIR: apps/rain
  RAIN_DART_DEFINES_FILE: apps/rain/tool/dart_defines.example.json
  BUILD_PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.build_relay_test && 'relay-test' || 'demo' }}
  ARTIFACT_RETENTION_CI: '14'
  ARTIFACT_RETENTION_RELEASE: '60'

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' && github.event.repository.security_and_analysis.dependency_graph.status == 'enabled' }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  workflow-lint:
    name: Workflow Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: false

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.8

      - name: Lint GitHub Actions workflows
        run: |
          "$(go env GOPATH)/bin/actionlint" -color

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-linux-androideabi,aarch64-linux-android,x86_64-linux-android

      - name: Install Flutter Rust Bridge codegen
        run: cargo install flutter_rust_bridge_codegen --version ${{ env.FRB_CODEGEN_VERSION }}

      - name: Print toolchain versions
        run: |
          flutter doctor -v
          flutter --version
          dart --version
          rustc --version
          cargo --version
          flutter_rust_bridge_codegen --version

      - name: Restore Dart and Flutter dependencies
        run: |
          dart pub get
          for package in \
            apps/rain \
            packages/peer_core \
            packages/protocol_brain \
            packages/rain_core
          do
            (cd "$package" && flutter pub get)
          done

      - name: Generate Rust bridge
        working-directory: ${{ env.RAIN_APP_DIR }}
        run: flutter_rust_bridge_codegen generate

      - name: Fail on dependency lock drift
        run: |
          git diff --exit-code -- pubspec.lock

      - name: Enforce Dart formatting
        run: |
          dart format --output=none --set-exit-if-changed \
            apps/rain/lib \
            apps/rain/test \
            apps/rain/tool \
            packages/peer_core/lib \
            packages/peer_core/test \
            packages/protocol_brain/lib \
            packages/protocol_brain/test \
            packages/rain_core/lib \
            packages/rain_core/test

      - name: Require generated code artifacts
        run: |
          test -s apps/rain/lib/application/state/app_state.freezed.dart
          test -s packages/rain_core/lib/database/rain_database.g.dart
          test -s apps/rain/lib/src/rust/frb_generated.dart
          test -s apps/rain/rust/src/frb_generated.rs

      - name: Verify Rust bridge generated code is committed
        run: |
          git diff --exit-code -- \
            apps/rain/lib/src/rust \
            apps/rain/rust/src/frb_generated.rs

      - name: Check Rust bridge crate
        run: |
          cargo fmt --manifest-path apps/rain/rust/Cargo.toml --check
          cargo test --manifest-path apps/rain/rust/Cargo.toml

      - name: Verify release guard fails closed
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $PSNativeCommandUseErrorActionPreference = $false
          $logPath = Join-Path $env:RUNNER_TEMP 'release-guard.log'
          $output = & pwsh -NoProfile -File scripts/build_release.ps1 -Platform android -OutputDir (Join-Path $env:RUNNER_TEMP 'release-guard-output') 2>&1
          $exitCode = $LASTEXITCODE
          $text = $output | Out-String
          $text | Set-Content -LiteralPath $logPath
          if ($exitCode -eq 0) {
            throw 'Release build unexpectedly succeeded without release dart defines and signing inputs.'
          }
          if ($text -notmatch 'Release builds require -DartDefinesFile') {
            Write-Host $text
            throw 'Release guard failed, but not with the expected missing dart defines message.'
          }
          exit 0

      - name: Upload release guard diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: release-guard-diagnostics
          path: ${{ runner.temp }}/release-guard.log
          if-no-files-found: ignore
          retention-days: ${{ env.ARTIFACT_RETENTION_CI }}

  static-analysis:
    name: Analyze (${{ matrix.id }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: rain-app
            path: apps/rain
          - id: peer-core
            path: packages/peer_core
          - id: protocol-brain
            path: packages/protocol_brain
          - id: rain-core
            path: packages/rain_core
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Restore dependencies
        working-directory: ${{ matrix.path }}
        run: flutter pub get

      - name: Run analyzer with warnings and infos as failures
        working-directory: ${{ matrix.path }}
        run: flutter analyze --fatal-infos --fatal-warnings

  tests:
    name: Test (${{ matrix.id }})
    runs-on: ubuntu-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: rain-app
            path: apps/rain
          - id: peer-core
            path: packages/peer_core
          - id: protocol-brain
            path: packages/protocol_brain
          - id: rain-core
            path: packages/rain_core
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Restore dependencies
        working-directory: ${{ matrix.path }}
        run: flutter pub get

      - name: Run randomized tests with coverage
        working-directory: ${{ matrix.path }}
        run: flutter test --coverage --test-randomize-ordering-seed=random --reporter expanded

      - name: Require coverage output
        run: test -s "${{ matrix.path }}/coverage/lcov.info"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.id }}
          path: ${{ matrix.path }}/coverage/lcov.info
          if-no-files-found: error
          retention-days: ${{ env.ARTIFACT_RETENTION_CI }}

  firebase-backend:
    name: Firebase Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/firebase/functions/package-lock.json

      - name: Validate Firebase JSON files
        run: |
          node -e "JSON.parse(require('fs').readFileSync('backend/firebase/firebase.json', 'utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('backend/firebase/database.rules.json', 'utf8'))"

      - name: Install Firebase function dependencies
        working-directory: backend/firebase/functions
        run: npm ci --ignore-scripts --no-audit

      - name: Lint Firebase functions
        working-directory: backend/firebase/functions
        run: npm run lint

      - name: Audit Firebase functions dependencies
        working-directory: backend/firebase/functions
        run: npm run audit:moderate

      - name: Run Firebase function tests if present
        working-directory: backend/firebase/functions
        run: npm test --if-present

  firebase-emulator-tests:
    name: Firebase Emulator Integration
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/firebase/functions/package-lock.json

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Run Firebase emulator integration tests
        run: bash scripts/ci_run_firebase_emulators.sh

  android-build:
    name: Android Build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -XX:MaxMetaspaceSize=1g -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-linux-androideabi,aarch64-linux-android,x86_64-linux-android

      - name: Install Flutter Rust Bridge codegen
        run: cargo install flutter_rust_bridge_codegen --version ${{ env.FRB_CODEGEN_VERSION }}

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Restore app dependencies
        working-directory: ${{ env.RAIN_APP_DIR }}
        run: flutter pub get

      - name: Generate Rust bridge
        working-directory: ${{ env.RAIN_APP_DIR }}
        run: flutter_rust_bridge_codegen generate

      - name: Verify Dart defines file exists
        run: test -f "${GITHUB_WORKSPACE}/${RAIN_DART_DEFINES_FILE}"

      - name: Build debug APK
        working-directory: ${{ env.RAIN_APP_DIR }}
        run: flutter build apk --debug --dart-define-from-file="${GITHUB_WORKSPACE}/${RAIN_DART_DEFINES_FILE}"

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: rain-debug-apk
          path: apps/rain/build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: ${{ env.ARTIFACT_RETENTION_CI }}

      - name: Upload Android failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: android-build-diagnostics
          path: |
            apps/rain/build/reports/**
            apps/rain/android/**/*.log
          if-no-files-found: ignore
          retention-days: ${{ env.ARTIFACT_RETENTION_CI }}

  test-gates:
    name: Test Gates
    runs-on: ubuntu-latest
    if: always()
    needs:
      - dependency-review
      - workflow-lint
      - quality-gate
      - static-analysis
      - tests
      - firebase-backend
      - firebase-emulator-tests
      - android-build
    steps:
      - name: Fail if any required job failed
        run: |
          test "${{ needs.dependency-review.result }}" = "success" || test "${{ needs.dependency-review.result }}" = "skipped"
          test "${{ needs.workflow-lint.result }}" = "success"
          test "${{ needs.quality-gate.result }}" = "success"
          test "${{ needs.static-analysis.result }}" = "success"
          test "${{ needs.tests.result }}" = "success"
          test "${{ needs.firebase-backend.result }}" = "success"
          test "${{ needs.firebase-emulator-tests.result }}" = "success"
          test "${{ needs.android-build.result }}" = "success"

  release-artifacts:
    name: Build EXE and APK Artifacts
    runs-on: windows-2022
    timeout-minutes: 120
    if: ${{ always() && needs.test-gates.result == 'success' }}
    needs:
      - test-gates
    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false -XX:MaxMetaspaceSize=1g -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError"
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: armv7-linux-androideabi,aarch64-linux-android,x86_64-linux-android

      - name: Install Flutter Rust Bridge codegen
        run: cargo install flutter_rust_bridge_codegen --version ${{ env.FRB_CODEGEN_VERSION }}

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Generate Rust bridge
        working-directory: ${{ env.RAIN_APP_DIR }}
        run: flutter_rust_bridge_codegen generate

      - name: Prepare OpenRelay demo dart defines
        shell: pwsh
        env:
          RAIN_RELEASE_DART_DEFINES_JSON: ${{ secrets.RAIN_RELEASE_DART_DEFINES_JSON }}
        run: |
          $definesPath = Join-Path $env:RUNNER_TEMP 'rain-openrelay-demo-defines.json'
          if ($env:BUILD_PROFILE -eq 'relay-test') {
            if ([string]::IsNullOrWhiteSpace($env:RAIN_RELEASE_DART_DEFINES_JSON)) {
              throw 'RAIN_RELEASE_DART_DEFINES_JSON secret is required for relay-test CI artifacts.'
            }
            Set-Content -LiteralPath $definesPath -Value $env:RAIN_RELEASE_DART_DEFINES_JSON -Encoding utf8NoBOM
            $defines = Get-Content -Raw -LiteralPath $definesPath | ConvertFrom-Json
            $brokerUrl = [string]$defines.RAIN_TURN_BROKER_URL
            if ([string]::IsNullOrWhiteSpace($brokerUrl)) {
              throw 'Relay-test build requires RAIN_TURN_BROKER_URL.'
            }
            $signalingKey = [string]$defines.RAIN_SIGNALING_ENCRYPTION_KEY
            if ([string]::IsNullOrWhiteSpace($signalingKey)) {
              throw 'Relay-test build requires RAIN_SIGNALING_ENCRYPTION_KEY.'
            }
            $allowPublicTurn = [string]$defines.RAIN_ALLOW_PUBLIC_TURN
            if ($allowPublicTurn.Trim().ToLowerInvariant() -ne 'false') {
              throw 'Relay-test build requires RAIN_ALLOW_PUBLIC_TURN=false.'
            }
            "RAIN_TURN_BROKER_URL=$brokerUrl" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          } else {
            Copy-Item -LiteralPath 'apps\rain\tool\dart_defines.example.json' -Destination $definesPath -Force
          }
          $env:RAIN_DART_DEFINES_FILE = $definesPath
          "RAIN_DART_DEFINES_FILE=$definesPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          if (-not (Test-Path -LiteralPath $env:RAIN_DART_DEFINES_FILE)) {
            throw "Dart defines file not found: $env:RAIN_DART_DEFINES_FILE"
          }

      - name: Build Windows EXE and mobile Android APK architectures
        shell: pwsh
        run: |
          $args = @(
            '-NoProfile',
            '-File',
            'scripts\build_release.ps1',
            '-Platform',
            'all',
            '-OutputDir',
            'artifacts',
            '-DartDefinesFile',
            $env:RAIN_DART_DEFINES_FILE,
            '-UseDemoAndroidSigningKey',
            '-GenerateSizeReports',
            '-Clean'
          )
          if ($env:BUILD_PROFILE -eq 'relay-test') {
            $args += '-ForceRelayOnlySmoke'
            $args += '-TurnBrokerUrl'
            $args += $env:RAIN_TURN_BROKER_URL
          } else {
            $args += '-AllowPublicTurnForDemo'
          }
          pwsh @args

      - name: Verify expected artifact set
        shell: pwsh
        run: |
          if ($env:BUILD_PROFILE -eq 'relay-test') {
            $expected = @(
              @{ Label = 'Windows portable EXE'; Path = 'artifacts\Rain-Relay-Test-Windows-x64-Build\rain.exe' },
              @{ Label = 'Windows SQLite runtime DLL'; Path = 'artifacts\Rain-Relay-Test-Windows-x64-Build\sqlite3.dll' },
              @{ Label = 'Windows win32 native asset DLL'; Path = 'artifacts\Rain-Relay-Test-Windows-x64-Build\win32_windows_x64.dll' },
              @{ Label = 'Android ARM v7 APK (armeabi-v7a)'; Path = 'artifacts\Rain-Relay-Test-android-armeabi-v7a.apk' },
              @{ Label = 'Android ARM v8/v9 APK (arm64-v8a)'; Path = 'artifacts\Rain-Relay-Test-android-arm64-v8a.apk' },
              @{ Label = 'Android ARM v7 size report'; Path = 'artifacts\size-reports\apk-code-size-analysis-android-arm.json' },
              @{ Label = 'Android ARM v8/v9 size report'; Path = 'artifacts\size-reports\apk-code-size-analysis-android-arm64.json' }
            )
          } else {
            $expected = @(
              @{ Label = 'Windows portable EXE'; Path = 'artifacts\Rain-Demo-Windows-x64-Build\rain.exe' },
              @{ Label = 'Windows SQLite runtime DLL'; Path = 'artifacts\Rain-Demo-Windows-x64-Build\sqlite3.dll' },
              @{ Label = 'Windows win32 native asset DLL'; Path = 'artifacts\Rain-Demo-Windows-x64-Build\win32_windows_x64.dll' },
              @{ Label = 'Android ARM v7 APK (armeabi-v7a)'; Path = 'artifacts\Rain-Demo-Android-ARM-v7-Build.apk' },
              @{ Label = 'Android ARM v8/v9 APK (arm64-v8a)'; Path = 'artifacts\Rain-Demo-Android-ARM-v8-v9-Build.apk' },
              @{ Label = 'Android ARM v7 size report'; Path = 'artifacts\size-reports\apk-code-size-analysis-android-arm.json' },
              @{ Label = 'Android ARM v8/v9 size report'; Path = 'artifacts\size-reports\apk-code-size-analysis-android-arm64.json' }
            )
          }
          foreach ($artifact in $expected) {
            $path = $artifact.Path
            if (-not (Test-Path -LiteralPath $path)) {
              throw "Missing expected artifact for $($artifact.Label): $path"
            }
            Write-Host "Verified $($artifact.Label): $path"
          }
          $unexpected = @(
            'artifacts\Rain-Demo-Android-Universal-Build.apk',
            'artifacts\Rain-Demo-Android-x86_64-Build.apk'
          )
          foreach ($path in $unexpected) {
            if (Test-Path -LiteralPath $path) {
              throw "Default CI/CD mobile artifacts must not include oversized optional APK: $path"
            }
          }
          $windowsArtifactDir = if ($env:BUILD_PROFILE -eq 'relay-test') { 'artifacts\Rain-Relay-Test-Windows-x64-Build' } else { 'artifacts\Rain-Demo-Windows-x64-Build' }
          $nestedArchives = Get-ChildItem -LiteralPath $windowsArtifactDir -Recurse -File |
            Where-Object { $_.Extension -in @('.zip', '.rar', '.7z') }
          if ($nestedArchives) {
            $archiveList = ($nestedArchives | ForEach-Object { $_.FullName }) -join "`n"
            throw "Windows portable upload folder must not contain nested archives:`n$archiveList"
          }
          Add-Type -AssemblyName System.IO.Compression -ErrorAction SilentlyContinue
          Add-Type -AssemblyName System.IO.Compression.FileSystem -ErrorAction SilentlyContinue
          function Assert-ApkEntry([string]$Path, [string]$Entry) {
            $archive = [System.IO.Compression.ZipFile]::OpenRead($Path)
            try {
              $entryNames = @($archive.Entries | ForEach-Object { $_.FullName })
              if ($entryNames -notcontains $Entry) {
                throw "APK is missing required native runtime entry: $Path -> $Entry"
              }
            } finally {
              $archive.Dispose()
            }
            Write-Host "Verified APK native runtime entry: $Path -> $Entry"
          }
          if ($env:BUILD_PROFILE -eq 'relay-test') {
            Assert-ApkEntry 'artifacts\Rain-Relay-Test-android-armeabi-v7a.apk' 'lib/armeabi-v7a/libsqlite3.so'
            Assert-ApkEntry 'artifacts\Rain-Relay-Test-android-arm64-v8a.apk' 'lib/arm64-v8a/libsqlite3.so'
          } else {
            Assert-ApkEntry 'artifacts\Rain-Demo-Android-ARM-v7-Build.apk' 'lib/armeabi-v7a/libsqlite3.so'
            Assert-ApkEntry 'artifacts\Rain-Demo-Android-ARM-v8-v9-Build.apk' 'lib/arm64-v8a/libsqlite3.so'
          }

      - name: Upload Windows portable EXE bundle
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BUILD_PROFILE == 'relay-test' && 'Rain-Relay-Test-Windows-x64-Build' || 'Rain-Demo-Windows-x64-Build' }}
          path: |
            artifacts/Rain-Demo-Windows-x64-Build
            artifacts/Rain-Relay-Test-Windows-x64-Build
          if-no-files-found: error
          retention-days: ${{ env.ARTIFACT_RETENTION_RELEASE }}

      - name: Upload Android APKs mobile architectures
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BUILD_PROFILE == 'relay-test' && 'Rain-Relay-Test-Android-Builds' || 'Rain-Demo-Android-Builds' }}
          path: |
            artifacts/Rain-Demo-Android-ARM-v8-v9-Build.apk
            artifacts/Rain-Demo-Android-ARM-v7-Build.apk
            artifacts/Rain-Relay-Test-android-arm64-v8a.apk
            artifacts/Rain-Relay-Test-android-armeabi-v7a.apk
          if-no-files-found: error
          retention-days: ${{ env.ARTIFACT_RETENTION_RELEASE }}

      - name: Upload Android APK size reports
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.BUILD_PROFILE == 'relay-test' && 'Rain-Relay-Test-Android-Size-Reports' || 'Rain-Demo-Android-Size-Reports' }}
          path: artifacts/size-reports/*.json
          if-no-files-found: error
          retention-days: ${{ env.ARTIFACT_RETENTION_RELEASE }}

  required-checks:
    name: Required Checks
    runs-on: ubuntu-latest
    if: always()
    needs:
      - test-gates
      - release-artifacts
    steps:
      - name: Fail if any required job failed
        run: |
          echo "ref: ${{ github.ref }}"
          echo "sha: ${{ github.sha }}"
          echo "test-gates: ${{ needs.test-gates.result }}"
          echo "release-artifacts: ${{ needs.release-artifacts.result }}"
          test "${{ needs.test-gates.result }}" = "success"
          test "${{ needs.release-artifacts.result }}" = "success"
