name: CI/CD

on:
  push:
    branches: [ main, codex/* ]
  pull_request:
    branches: [ main ]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Melos
        run: dart pub global activate melos

      - name: Get dependencies
        run: melos bootstrap
      - name: Start Firebase Emulators and Run Firebase Tests
        run: bash scripts/ci_run_firebase_emulators.sh
        env:
          RUN_TESTS: true

      - name: Analyze
        run: melos exec -- flutter analyze

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [analyze]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'

      - name: Install Melos
        run: dart pub global activate melos

      - name: Get dependencies
        run: melos bootstrap

      - name: Test
        run: melos exec -- flutter test

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: [analyze, test]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/codex/')
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'

      - name: Install Melos
        run: dart pub global activate melos

      - name: Get dependencies
        run: melos bootstrap

      - name: Build Portable Windows Release
        run: pwsh -File scripts/build_release.ps1 -Platform windows -OutputDir artifacts -Clean

      - name: Verify Windows Artifact
        run: Get-ChildItem artifacts

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: artifacts/Rain-windows-portable.zip

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [analyze, test]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/codex/')
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'

      - name: Install Melos
        run: dart pub global activate melos

      - name: Get dependencies
        run: melos bootstrap

      - name: Build Android Release APK
        run: pwsh -File scripts/build_release.ps1 -Platform android -OutputDir artifacts -Clean

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: artifacts/Rain-release-android.apk

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-android]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows Build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
