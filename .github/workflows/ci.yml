name: CI/CD

on:
  push:
    branches: [ main, codex/* ]
  pull_request:
    branches: [ main ]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'

      - name: Install Melos
        run: dart pub global activate melos

      - name: Get dependencies
        run: melos bootstrap

      - name: Analyze
        run: melos exec -- flutter analyze

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [analyze]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'

      - name: Install Melos
        run: dart pub global activate melos

      - name: Get dependencies
        run: melos bootstrap

      - name: Test
        run: melos exec -- flutter test

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: [analyze, test]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/codex/')
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          windows-desktop: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Get dependencies
        run: melos bootstrap

      - name: Build Windows
        run: flutter build windows --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: apps/rain/build/windows/x64/runner/Release/rain.exe

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [analyze, test]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/codex/')
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'

      - name: Install Melos
        run: dart pub global activate melos

      - name: Get dependencies
        run: melos bootstrap

      - name: Build APK
        run: flutter build apk --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: apps/rain/build/app/outputs/flutter-apk/app-release.apk

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-android]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: artifacts

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
