name: CI

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.38.5'

jobs:
  flutter-checks:
    name: Flutter Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable

      - name: Bootstrap root package
        run: dart pub get

      - name: Analyze app
        working-directory: apps/rain
        run: flutter analyze

      - name: Test app
        working-directory: apps/rain
        run: flutter test

      - name: Test peer core
        working-directory: packages/peer_core
        run: flutter test

      - name: Test protocol brain
        working-directory: packages/protocol_brain
        run: flutter test

      - name: Test rain core
        working-directory: packages/rain_core
        run: flutter test
