name: CI/CD

on:
  workflow_dispatch:
  push:
    branches: [ main, codex/* ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'

      - name: Install Melos
        run: dart pub global activate melos

      - name: Get dependencies
        run: melos bootstrap

      - name: Analyze
        run: melos exec -- flutter analyze

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [analyze]
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'

      - name: Install Melos
        run: dart pub global activate melos

      - name: Get dependencies
        run: melos bootstrap

      - name: Test
        run: melos exec -- flutter test

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: [analyze, test]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/codex/') || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'

      - name: Install Melos
        run: dart pub global activate melos

      - name: Get dependencies
        run: melos bootstrap

      - name: Build Portable Windows Release
        run: pwsh -File scripts/build_release.ps1 -Platform windows -OutputDir artifacts -Clean

      - name: Verify Windows Artifact
        run: Get-ChildItem artifacts

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: windows-build
          path: artifacts/Rain-windows-portable.zip

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [analyze, test]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/codex/') || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'

      - name: Install Melos
        run: dart pub global activate melos

      - name: Get dependencies
        run: melos bootstrap

      - name: Build Android Release APK
        run: |
          cd apps/rain
          flutter build apk --release

      - name: Prepare Artifact Directory
        run: mkdir -p artifacts

      - name: Move Android APK
        run: cp apps/rain/build/app/outputs/flutter-apk/app-release.apk artifacts/Rain-release-android.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: android-apk
          path: artifacts/Rain-release-android.apk

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-android]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download Windows Build
        uses: actions/download-artifact@v5
        with:
          name: windows-build
          path: artifacts

      - name: Download Android APK
        uses: actions/download-artifact@v5
        with:
          name: android-apk
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
